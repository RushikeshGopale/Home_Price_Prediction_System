<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="CSS/style.css" />
<!-- <script type="text/javascript" src="JS/AjaxHandle.js"></script> -->

<style>
body {
	background: #121212;
	color: white;
	transition: 0.3s;
}

body.light {
	background: #f5f5f5;
	color: black;
}

/* Navbar */
.navbar {
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
}

/* Welcome section */
.welcome {
	text-align: center;
	margin-top: 100px;
	animation: fadeIn 1s ease;
}

.theme-btn {
	position: absolute;
	right: 20px;
	top: 10px;
}

/* Animation */
@keyframes fadeIn {
	from {opacity: 0;
	transform: translateY(-20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}
}
</style>
</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<a class="navbar-brand" href="#">HomePricePrediction</a>

		<button class="navbar-toggler" type="button" data-toggle="collapse"
			data-target="#navbarSupportedContent">
			<span class="navbar-toggler-icon"></span>
		</button>

		<button class="btn btn-light theme-btn" onclick="toggleTheme()">change Theme</button>

		<div class="collapse navbar-collapse" id="navbarSupportedContent">
			<ul class="navbar-nav mr-auto">

				<!-- User Profile -->
				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" href="ViewProfile"> View
						Profile </a></li>
				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" href="ViewPropertyForUser">
						View Property </a></li>

				<!-- View own search property -->
				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" href="ViewInterestedProperty">
						View own search property </a></li>

				<!-- prices -->
				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" href="ViewPredictedPrice" >
						view Predicted prices </a></li>

				<li class="nav-item dropdown"><a
					class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
						Log Out</a>
					<div class="dropdown-menu">
						<a class="dropdown-item" href="userlogin.html">Log Out</a>
					</div></li>

				<li class="nav-item"><a
					class="nav-link text-warning font-weight-bold" href="#">
						Welcome <span id="uname"></span>
				</a></li>


			</ul>
		</div>
	</nav>

	<!-- Welcome Section -->
	<div class="welcome">
		<!--<h1>Welcome </h1>  -->
		<p>Explore our House Price Prediction system from the menu above</p>
	</div>

	<script>
		function toggleTheme() {
			document.body.classList.toggle("light");
		}
	</script>
<script src="/HousePriceWebApplication/JS/AjaxHandle.js"></script>
