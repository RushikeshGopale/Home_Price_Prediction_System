<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"> 
<link rel="stylesheet" href="CSS/style.css">
<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#121212;
font-family:sans-serif;
transition:0.3s;
}
body.light{
background:#f5f5f5;
}
.login-card{
width:350px;
padding:30px;
border-radius:15px;
background:#1e1e1e;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:fadeIn 1s ease;
}
body.light .login-card{
background:white;
color:black;
}
.form-control{
border-radius:25px;
background:#2c2c2c;
color:white;
border:none;
}
body.light .form-control{
background:#eee;
color:black;
}
.form-control:focus{
box-shadow:0 0 10px #6c63ff;
}
.btn-login{
border-radius:25px;
background:#6c63ff;
color:white;
transition:0.3s;
}
.btn-login:hover{
transform:scale(1.05);
}
.toggle-btn{
position:absolute;
right:20px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#aaa;
}
.error{
color:#ff4d4d;
font-size:14px;
display:none;
animation:shake 0.3s;
}
.switch{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
color:white;
}
body.light .switch{
color:black;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>

</head>

<body>

<div class="switch" onclick="toggleTheme()">🌙</div>

<form name="frm" action="AdminLoginController" method="post" onsubmit="return validateForm()">

<div class="login-card">

<h3 class="text-center mb-4">Admin Login</h3>

<div class="form-group p-2 m-2">
<input type="text" id="username" name="username" placeholder="username" class="form-control"/>
<div id="userError" class="error">Enter username</div>
</div>

<div class="form-group p-2 m-2 position-relative">
<input type="password" id="password" name="password" placeholder="password" class="form-control"/>
<span class="toggle-btn" onclick="togglePassword()">
<i class="bi bi-eye"></i>
</span>
<div id="passError" class="error">Enter password</div>
</div>

<div class="form-group p-2 m-2">
<input type="submit" name="s" value="Login" class="form-control btn-login"/>
</div>

</div>

</form>

<script>
function togglePassword()
{
let pass=document.getElementById("password");
if(pass.type==="password")
pass.type="text";
else
pass.type="password";
}

function validateForm()
{
let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();
let valid=true;

if(user==="")
{
document.getElementById("userError").style.display="block";
valid=false;
}
else
document.getElementById("userError").style.display="none";

if(pass==="")
{
document.getElementById("passError").style.display="block";
valid=false;
}
else
document.getElementById("passError").style.display="none";

return valid;
}

function toggleTheme()
{
document.body.classList.toggle("light");
}
</script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
