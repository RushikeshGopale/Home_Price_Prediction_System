<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script type="text/javascript" src="JS/AjaxHandle.js"></script>

<style>
body{
background-color:#f8f9fa;
}
.login-box{
width:350px;
margin:100px auto;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<div class="login-box bg-dark text-white">
<h3 class="text-center mb-4">User Login</h3>

<form action="ValidateUser" method="post">

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required  onkeyup='checkUserExistance(this.value)'/> &nbsp;<span id="s"></span>

</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter password" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Login</button>
</div>

</form>

<p class="text-center mt-3">
Not registered? 
<a href="register.html" class="text-decoration-none">Register here</a>
</p>

</div>

</body>
</html>
