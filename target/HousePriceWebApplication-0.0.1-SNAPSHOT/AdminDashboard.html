<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="CSS/style.css"/>
<script type="text/javascript" src="JS/AjaxHandle.js"></script>

<style>
body{
background:#121212;
color:white;
transition:0.3s;
}
body.light{
background:#f5f5f5;
color:black;
}

/* Navbar */
.navbar{
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* Welcome section */
.welcome{
text-align:center;
margin-top:100px;
animation:fadeIn 1s ease;
}

.theme-btn{
position:absolute;
right:20px;
top:10px;
}

/* Animation */
@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="#">HomePricePrediction</a>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
    <span class="navbar-toggler-icon"></span>
  </button>

  <button class="btn btn-light theme-btn" onclick="toggleTheme()">🌙</button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">

      <!-- State -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
          State Master
        </a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="AddStateServlet">Add State</a>
          <a class="dropdown-item" href="ViewAllState">View State</a>
        </div>
      </li>

      <!-- City -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
          City Master
        </a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="AddCityServlet">Add City</a>
          <a class="dropdown-item" href="ViewCity">View All City</a>
        </div>
      </li>

      <!-- Location -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
          Location Master
        </a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="AddLocation">Add location</a>
          <a class="dropdown-item" href="ViewLocation">view all location</a>
        </div>
      </li>

      <!-- Property -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
          Property Master
        </a>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="AddPropertyServlet">Add property</a>
          <a class="dropdown-item" href="ViewProperty">view all property</a>
        </div>
      </li>

    </ul>
  </div>
</nav>

<!-- Welcome Section -->
<div class="welcome">
    <h1>Welcome Admin</h1>
    <p>Manage your House Price Prediction system from the menu above</p>
</div>

<script>
function toggleTheme()
{
document.body.classList.toggle("light");
}
</script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
